name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run pytest
      - run: pixi run ruff check src tests
      - run: pixi run desktop-build
      - name: Prepare release metadata
        run: |
          mkdir -p dist
          sha256sum dist/MyNovel* > dist/checksums.sha256
          checksum="$(cut -d ' ' -f 1 dist/checksums.sha256 | head -n 1)"
          printf '{"channel":"stable","tag":"%s","sha256":"%s","notes":"生成更新元数据"}\n' "${GITHUB_REF_NAME}" "${checksum}" > dist/update.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            dist/update.json
            dist/checksums.sha256
            dist/MyNovel*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/update.json
            dist/checksums.sha256
            dist/MyNovel*
