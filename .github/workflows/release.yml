name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset_suffix: macos-arm64
            executable: MyNovel
          - os: macos-13
            asset_suffix: macos-x64
            executable: MyNovel
          - os: windows-latest
            asset_suffix: windows-x64
            executable: MyNovel.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run pytest
      - run: pixi run ruff check src tests
      - run: pixi run ruff format --check src tests
      - run: pixi run typecheck
      - run: pixi run schema-check
      - run: pixi run desktop-build
      - name: Prepare release metadata
        shell: python
        run: |
          import hashlib
          import json
          import os
          from pathlib import Path

          dist = Path("dist")
          asset = dist / "${{ matrix.executable }}"
          target = dist / f"MyNovel-${{ matrix.asset_suffix }}{asset.suffix}"
          asset.replace(target)
          digest = hashlib.sha256(target.read_bytes()).hexdigest()
          checksum = dist / f"checksums-${{ matrix.asset_suffix }}.sha256"
          checksum.write_text(f"{digest}  {target.name}\n", encoding="utf-8")
          manifest = {
              "channel": "stable",
              "version": os.environ["GITHUB_REF_NAME"].lstrip("v"),
              "tag": os.environ["GITHUB_REF_NAME"],
              "platform": "${{ matrix.asset_suffix }}",
              "url": target.name,
              "sha256": digest,
              "size_bytes": target.stat().st_size,
              "notes": "生成更新元数据",
          }
          (dist / f"update-${{ matrix.asset_suffix }}.json").write_text(
              json.dumps(manifest, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: |
            dist/update-${{ matrix.asset_suffix }}.json
            dist/checksums-${{ matrix.asset_suffix }}.sha256
            dist/MyNovel-${{ matrix.asset_suffix }}*

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/update-*.json
            dist/checksums-*.sha256
            dist/MyNovel-*
