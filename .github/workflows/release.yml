name: Release

"on":
  push:
    branches: [main]

env:
  RELEASE_VERSION: 0.1.${{ github.run_number }}
  RELEASE_TAG: v0.1.${{ github.run_number }}

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset_suffix: macos-arm64
            installer_glob: MyNovel-macos-arm64.dmg
          - os: macos-15-intel
            asset_suffix: macos-x64
            installer_glob: MyNovel-macos-x64.dmg
          - os: windows-latest
            asset_suffix: windows-x64
            installer_glob: MyNovel-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run npm install --package-lock=false
        working-directory: frontend
      - run: pixi run npm run build
        working-directory: frontend
      - run: pixi run python -m mynovel.release_package sync-frontend-dist --source frontend/dist --target src/mynovel/frontend/dist
      - run: pixi run pytest
      - run: pixi run ruff check src tests
      - run: pixi run ruff format --check src tests
      - run: pixi run mypy src
      - run: pixi run python -m mynovel.schema_check
      - run: pixi run pyinstaller --name MyNovelBackend --onefile --collect-all mynovel --workpath build/pyinstaller --specpath build src/mynovel/desktop.py
      - name: Prepare Electron backend resource
        run: |
          import shutil
          import sys
          from pathlib import Path

          dist = Path("dist")
          backend_dir = dist / "backend"
          backend_dir.mkdir(parents=True, exist_ok=True)
          executable_name = "MyNovelBackend.exe" if sys.platform == "win32" else "MyNovelBackend"
          shutil.copy2(dist / executable_name, backend_dir / executable_name)
        shell: python
      - name: Build Electron installer
        run: pixi run npm run electron:build
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MYNOVEL_ASSET_SUFFIX: ${{ matrix.asset_suffix }}
      - name: Write update metadata
        run: pixi run python -m mynovel.release_package write-metadata --dist dist --artifact "dist/${{ matrix.installer_glob }}" --version "${{ env.RELEASE_VERSION }}" --platform "${{ matrix.asset_suffix }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: |
            dist/update-${{ matrix.asset_suffix }}.json
            dist/checksums-${{ matrix.asset_suffix }}.sha256
            dist/${{ matrix.installer_glob }}

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MyNovel ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/update-*.json
            dist/checksums-*.sha256
            dist/*.dmg
            dist/*.exe
