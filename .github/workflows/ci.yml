name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run npm install --package-lock=false
        working-directory: frontend
      - run: pixi run npm run build
        working-directory: frontend
      - run: pixi run python -m mynovel.release_package sync-frontend-dist --source frontend/dist --target src/mynovel/frontend/dist
      - run: pixi run pytest
      - run: pixi run ruff check src tests
      - run: pixi run ruff format --check src tests
      - run: pixi run mypy src
      - run: pixi run python -m mynovel.schema_check
      - run: pixi run npm run test
        working-directory: frontend
      - run: pixi run npm run typecheck
        working-directory: frontend
