[workspace]
name = "mynovel"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = ">=24"
libffi = ">=3.4,<3.5"
packaging = ">=24,<26"
nodejs = ">=22.12,<23"

[pypi-dependencies]
mynovel = { path = ".", editable = true }
pytest = ">=8.0"
ruff = ">=0.5"
pyinstaller = ">=6.0"
mypy = ">=1.10"

[tasks]
dev = "mynovel-dev --db .mynovel/dev.sqlite"
desktop = "mynovel-desktop --db .mynovel/dev.sqlite"
desktop-build = "pyinstaller --name MyNovel --onefile --collect-all mynovel --workpath build/pyinstaller --specpath build src/mynovel/desktop.py"
native-package = "python -m mynovel.release_package"
test = "pytest"
lint = "ruff check src tests"
format = "ruff format src tests"
typecheck = "mypy src"
schema-check = "python -m mynovel.schema_check"
cli = "mynovel --help"
frontend-install = "npm --prefix frontend install --package-lock=false"
frontend-dev = "pixi run frontend-install && npm --prefix frontend run dev"
frontend-build = "pixi run frontend-install && npm --prefix frontend run build"
frontend-typecheck = "pixi run frontend-install && npm --prefix frontend run typecheck"
frontend-lint = "pixi run frontend-install && npm --prefix frontend run lint"
frontend-test = "pixi run frontend-install && npm --prefix frontend run test"
frontend-e2e = "pixi run frontend-install && npm --prefix frontend run e2e"
