[workspace]
name = "mynovel"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = ">=24"
libffi = ">=3.4,<3.5"
packaging = ">=24,<26"

[pypi-dependencies]
mynovel = { path = ".", editable = true }
pytest = ">=8.0"
ruff = ">=0.5"
pyinstaller = ">=6.0"

[tasks]
dev = "mynovel-dev --db .mynovel/dev.sqlite"
desktop = "mynovel-desktop --db .mynovel/dev.sqlite"
desktop-build = "pyinstaller --name MyNovel --onefile --collect-all mynovel --workpath build/pyinstaller --specpath build .pixi/envs/default/bin/mynovel-desktop"
test = "pytest"
lint = "ruff check src tests"
format = "ruff format src tests"
cli = "mynovel --help"
