[workspace]
name = "mynovel"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = ">=24"
libffi = ">=3.4,<3.5"
packaging = ">=24,<26"
nodejs = ">=22.12,<23"

[pypi-dependencies]
mynovel = { path = ".", editable = true }
pytest = ">=8.0"
ruff = ">=0.5"
pyinstaller = ">=6.0"
mypy = ">=1.10"

[tasks]
dev = "pixi run frontend-install && python -m mynovel.dev_stack --db .mynovel/dev.sqlite"
preview = "pixi run frontend-install && npm --prefix frontend run build && python -m mynovel.release_package sync-frontend-dist --source frontend/dist --target src/mynovel/frontend/dist && mynovel-dev --db .mynovel/dev.sqlite"
frontend-install = "npm --prefix frontend install --package-lock=false"
