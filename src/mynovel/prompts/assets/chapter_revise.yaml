id: chapter_revise
name: Chapter Revise
version: "0.1.0"
purpose: Revise a chapter draft according to audit findings.
source: original
source_license: Apache-2.0
adaptation_notes: Revisions remain candidates until human approval.
model_family_hint: OpenAI-compatible chat models.
input_schema:
  required:
    - chapter_title
    - draft_text
    - audit_report
output_schema:
  type: object
  required:
    - operations
template: |
  根据审计意见为《{chapter_title}》生成可应用的局部 JSON 补丁。
  只返回 {"operations":[...]}，不要返回完整正文。
