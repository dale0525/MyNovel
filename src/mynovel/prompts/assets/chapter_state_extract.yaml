id: chapter_state_extract
name: Chapter State Extract
version: "0.1.0"
purpose: Extract reviewable state changes from a draft chapter.
source: original
source_license: Apache-2.0
adaptation_notes: Extracted state remains pending until human approval.
model_family_hint: OpenAI-compatible chat models with JSON response-format support.
input_schema:
  required:
    - chapter_title
    - draft_text
output_schema:
  required:
    - chapter
    - changes
  change_item:
    required:
      - type
      - target
      - change
      - risk
template: |
  从《{chapter_title}》草稿提取人物、关系、地点、资源、伏笔和信息暴露变化，只输出 JSON。
  changes 必须是数组，每项必须包含 type、target、change、risk。
  不要只返回 characters、relationships、locations、resources 或 foreshadowing 这类分区名。
  若正文出现新线索、资源增减、身份暴露、关系转折、地点控制权变化或伏笔兑现，必须提取为具体变动。
